<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Plotly Figures</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <style>
        #plotly-div {
            width: 100%;
            height: 80vh;
        }

        .btn-custom {
            width: 40%;
            transition: background-color 0.3s, transform 0.3s;
        }

        .btn-custom:hover {
            background-color: #007bff;
            transform: scale(1.05);
        }

        .sidebar {
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        
        .loader {
            display: none;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="container-fluid h-100">
    <div class="row h-100">
        <!-- Sidebar with buttons -->
        <div class="col-3 bg-light h-100 d-flex flex-column align-items-center py-5 sidebar">
            <button class="btn btn-primary mb-3 btn-custom" onclick="loadFigure('weight.json')">Weight Figure</button>
            <button class="btn btn-primary mb-3 btn-custom" onclick="loadFigure('figure2.json')">Second Figure</button>
            <button class="btn btn-primary btn-custom" onclick="loadFigure('figure3.json')">Third Figure</button>
            <div class="loader mt-5"></div>
        </div>
        
        <!-- Main content area for displaying figures -->
        <div class="col-9 py-4 px-5">
            <div id="plotly-div"></div>
        </div>
    </div>
</div>

<script>
    function loadFigure(dataFile) {
        document.querySelector('.loader').style.display = 'block';
        fetch(dataFile)
            .then(response => response.json())
            .then(figure => {
                figure.layout.width = document.getElementById('plotly-div').clientWidth;
                figure.layout.height = document.getElementById('plotly-div').clientHeight;
                Plotly.newPlot('plotly-div', figure.data, figure.layout);
                document.querySelector('.loader').style.display = 'none';
            })
            .catch(error => {
                console.error("Error fetching or plotting the data:", error);
                alert("Error loading the figure.");
                document.querySelector('.loader').style.display = 'none';
            });
    }

    // Load the initial figure
    loadFigure('weight.json');
</script>

<!-- Bootstrap JS and Popper.js -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
