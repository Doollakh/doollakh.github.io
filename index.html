<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plotly Figure</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        #plotly-div {
            width: 1900px;
            height: 800px;
        }
    </style>
</head>

<body>

    <div id="plotly-div"></div>

    <script>
        // Load the figure from the JSON file
        fetch('weight.json')
            .then(response => response.json())
            .then(figure => {
                // Update layout width and height
                figure.layout.width = 1900;  // in pixels
                figure.layout.height = 800;  // in pixels
                
                Plotly.newPlot('plotly-div', figure.data, figure.layout);
            });
    </script>

</body>

</html>
