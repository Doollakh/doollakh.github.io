<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Plotly Figures</title>

    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        /* Your CSS styles ... */

        /* Extra styles based on your theme */

        body, html {
            background: var(--smoky-black);
            font-family: var(--ff-poppins);
        }

        .sidebar {
            padding: 15px;
            background: var(--eerie-black-2);
            border-radius: 0 20px 20px 0;
            box-shadow: var(--shadow-1);
        }

        .btn-custom {
            margin-bottom: 10px;
            padding: 10px 20px;
            background: var(--bg-gradient-onyx);
            border: none;
            border-radius: 8px;
            color: var(--white-1);
            transition: var(--transition-2);
            font-size: var(--fs-3);
            font-weight: var(--fw-500);
            text-align: center;
        }

        .btn-custom:hover {
            background: var(--bg-gradient-jet);
            transform: scale(1.05);
            color: var(--orange-yellow-crayola);
        }

        #plotly-div {
            border-radius: 20px;
            background: var(--eerie-black-1);
            box-shadow: var(--shadow-2);
            padding: 20px;
        }

        .loader {
            margin-top: 50px;
            border: 5px solid var(--eerie-black-1);
            border-top: 5px solid var(--orange-yellow-crayola);
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="container-fluid h-100">
    <div class="row h-100">
        <!-- Sidebar with buttons -->
        <div class="col-3 sidebar">
            <button class="btn-custom" onclick="loadFigure('weight.json')">Weight = [0 - 1]</button>
            <button class="btn-custom" onclick="loadFigure('w.json')">Weight = [0 - 0.1]</button>
            <button class="btn-custom" onclick="loadPicture('path_to_picture1.jpg')">Load Picture 1</button>
            <button class="btn-custom" onclick="loadPicture('path_to_picture2.jpg')">Load Picture 2</button>
            <button class="btn-custom" onclick="loadFigure('w.json')">Third Figure</button>
            <div class="loader mt-5"></div>
        </div>

        <!-- Main content area for displaying figures -->
        <div class="col-9 py-4 px-5">
            <div id="plotly-div"></div>
        </div>
    </div>
</div>

<script>
    function loadFigure(dataFile) {
        document.querySelector('.loader').style.display = 'block';
        fetch(dataFile)
            .then(response => response.json())
            .then(figure => {
                figure.layout.width = document.getElementById('plotly-div').clientWidth;
                figure.layout.height = document.getElementById('plotly-div').clientHeight;
                Plotly.newPlot('plotly-div', figure.data, figure.layout);
                document.querySelector('.loader').style.display = 'none';
            })
            .catch(error => {
                console.error("Error fetching or plotting the data:", error);
                alert("Error loading the figure.");
                document.querySelector('.loader').style.display = 'none';
            });
    }

    function loadPicture(imagePath) {
        document.querySelector('.loader').style.display = 'block';

        let img = new Image();
        img.src = imagePath;
        img.onload = function() {
            document.getElementById('plotly-div').innerHTML = '';  // clear previous content
            document.getElementById('plotly-div').appendChild(img);
            document.querySelector('.loader').style.display = 'none';
        }
    }

    // Load the initial figure
    loadFigure('weight.json');
</script>

<!-- Bootstrap JS and Popper.js -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
