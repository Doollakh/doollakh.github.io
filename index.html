<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Plotly Figures</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        #plotly-div {
            width: 80vw;  /* 80% of the viewport width */
            height: 80vh;  /* 80% of the viewport height */
        }
    </style>
</head>

<body>

<div class="container-fluid h-100">
    <div class="row h-100">
        <!-- Sidebar with buttons -->
        <div class="col-3 bg-light h-100 d-flex flex-column align-items-center py-5">
            <button class="btn btn-primary mb-3" onclick="loadFigure('weight.json')">Weight</button>
            <button class="btn btn-primary mb-3" onclick="loadFigure('weight.json')">Figure 2</button>
            <button class="btn btn-primary" onclick="loadFigure('weight.json')">Figure 3</button>
        </div>
        
        <!-- Main content area for displaying figures -->
        <div class="col-9">
            <div id="plotly-div"></div>
        </div>
    </div>
</div>

<script>
    function loadFigure(dataFile) {
        fetch(dataFile)
            .then(response => response.json())
            .then(figure => {
                // Update layout width and height
                figure.layout.width = document.getElementById('plotly-div').clientWidth;
                figure.layout.height = document.getElementById('plotly-div').clientHeight;
                Plotly.newPlot('plotly-div', figure.data, figure.layout);
            })
            .catch(error => {
                console.error("Error fetching or plotting the data:", error);
            });
    }

    // Load the initial figure
    loadFigure('weight.json');
</script>

<!-- Bootstrap JS and Popper.js (optional) -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
