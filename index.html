<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Title Here</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poiret+One|Source+Sans+Pro">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-size: 110%;
            color: #ecf0f1;
            font-family: 'Source Sans Pro', sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .main {
            position: absolute;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .title {
            font-family: 'Poiret One', cursive;
            font-size: 4rem;
            margin-bottom: .5rem;
            width: 100%;
        }

        .sub-title {
            border-top: .1rem solid #fff;
            padding: 1rem 4rem;
            text-align: center;
        }

        @keyframes animStar {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(-2000px);
            }
        }

        /* Additional styles for the star animation */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .stars, .stars2, .stars3 {
            position: fixed;
            width: 2px;
            height: 2px;
            background-color: #fff;
            opacity: 0.8;
            animation: animStar 20s linear infinite;
        }

        .stars {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .stars2 {
            top: 0;
            left: 75%;
            animation-delay: 5s;
        }

        .stars3 {
            top: 0;
            left: 25%;
            animation-delay: 10s;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="stars" aria-hidden="true"></div>
    <div class="stars2" aria-hidden="true"></div>
    <div class="stars3" aria-hidden="true"></div>
    <main class="main">
        <section class="contact">
            <h1 class="title">Hossein Resani</h1>
            <h2 class="sub-title">Site Under Construction</h2>
        </section>
    </main>
</body>
</html>
